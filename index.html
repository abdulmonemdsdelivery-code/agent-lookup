<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تقيم النمدوب</title>
    <link rel="icon" href="image/unnamed.jpg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="logo">
          <img src="image/unnamed-removebg-preview.png" alt="" width="200px" />
        </div>
        <h1>اعرف جودة التسليم</h1>
        <p class="subtitle">أدخل رقم ID الخاص بك لعرض بياناتك</p>
      </div>

      <!-- Search -->
      <label for="agentId">🔢 رقم الـ ID</label>
      <input
        type="text"
        id="agentId"
        placeholder="أدخل رقم الـ ID هنا"
        oninput="clearResult()"
        onkeydown="handleEnterKey(event)"
      />
      <button onclick="lookup()">🔍 &nbsp; عرض بياناتي</button>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">
        ❌ رقم ID غير موجود، تحقق من الرقم وحاول مجدداً
      </div>

      <!-- Result -->
      <div class="result-card" id="resultCard">
        <div class="agent-header">
          <div class="avatar">
            <img
              src="image/Screenshot_2026-06-20_150650-removebg-preview.png"
              width="60px"
              alt=""
            />
          </div>
          <div>
            <div class="agent-name" id="agentName"></div>
            <div class="agent-id" id="agentIdDisplay"></div>
          </div>
        </div>

        <div class="info-row">
          <span class="info-label">🏙️ منطقة العمل</span>
          <span class="info-value" id="resArea"></span>
        </div>
        <div class="info-row">
          <span class="info-label">🪪 رقم الإقامة</span>
          <span class="info-value" id="resIqama"></span>
        </div>
        <div class="info-row">
          <span class="info-label">📅 التاريخ</span>
          <span class="info-value" id="resDate"></span>
        </div>
        <div class="info-row">
          <span class="info-label">⭐ التصنيف</span>
          <span class="info-value"
            ><span class="badge" id="resBadge"></span
          ></span>
        </div>
      </div>

      <div class="footer" style="color: red" id="footerText"></div>
      <p class="footer" style="color: red"></p>
    </div>

    <!-- ① بيانات المندوبين -->
    <script src="data.js"></script>

    <!-- ② الكود اللي بيشغّل البحث -->
    <script src="app.js"></script>
  </body>
</html>
